version: '3.8'

services:
  pgsqlite:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      PGSQLITE_DATABASE: /var/lib/postgresql/data
      PGSQLITE_DEFAULT_DATABASE: postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "/var/run/postgresql", "-p", "5432"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
